name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Create GitHub App token
        id: app-token
        # v3.2.0 was verified immutable with `gh release view --repo actions/create-github-app-token`.
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Run Release Please
        id: release
        # googleapis/release-please-action v5.0.0; pinned because the tag is not immutable.
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            mise-platform: linux-x64
            archive: tar.gz
            binary: vstui
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            mise-platform: linux-arm64
            archive: tar.gz
            binary: vstui
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            mise-platform: macos-x64
            archive: tar.gz
            binary: vstui
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            mise-platform: macos-arm64
            archive: tar.gz
            binary: vstui
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            mise-platform: windows-x64
            archive: zip
            binary: vstui.exe
          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            mise-platform: windows-arm64
            archive: zip
            binary: vstui.exe
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" package/
          tar -C package -czf "dist/vstui-${{ needs.release-please.outputs.tag_name }}-${{ matrix.mise-platform }}.tar.gz" "${{ matrix.binary }}"

      - name: Package Windows binary
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist, package
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" package/
          Compress-Archive -Path "package/${{ matrix.binary }}" -DestinationPath "dist/vstui-${{ needs.release-please.outputs.tag_name }}-${{ matrix.mise-platform }}.zip"

      - name: Generate artifact attestation
        # v4.1.1 was verified immutable with `gh release view --repo actions/attest-build-provenance`.
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: dist/*

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vstui-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish-assets:
    name: Upload Release Assets
    needs:
      - release-please
      - build
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub App token
        id: app-token
        # v3.2.0 was verified immutable with `gh release view --repo actions/create-github-app-token`.
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber=false

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --draft=false --latest
